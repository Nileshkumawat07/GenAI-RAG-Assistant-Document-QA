---
- hosts: all
  gather_facts: false
  vars:
    groq_api_key: "{{ groq_api_key | default(lookup('env', 'GROQ_API_KEY'), true) }}"

  pre_tasks:
    - name: Ensure GROQ API key is provided
      ansible.builtin.assert:
        that:
          - groq_api_key | length > 0
        fail_msg: "Pass groq_api_key to ansible-playbook or set GROQ_API_KEY in the environment."

  tasks:
    - name: Verify image exists on server
      ansible.builtin.raw: docker image inspect nilesh9890/genai-rag:latest
      register: image_check
      changed_when: false
      failed_when: image_check.rc != 0

    - name: Remove existing app container if present
      ansible.builtin.raw: >
        if docker container inspect genai-container >/dev/null 2>&1; then
          docker rm -f genai-container;
        fi
      changed_when: false

    - name: Run container
      ansible.builtin.raw: >
        docker run -d
        --name genai-container
        -p 5000:8000
        -e GROQ_API_KEY={{ groq_api_key | quote }}
        --restart unless-stopped
        nilesh9890/genai-rag:latest
      no_log: true

    - name: Verify container running
      ansible.builtin.raw: docker ps --filter name=genai-container
