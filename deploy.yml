- hosts: all
  become: true
  gather_facts: false

  tasks:

    - name: Remove old container (fast & safe)
      shell: docker rm -f genai-container 2>/dev/null || true

    - name: Pull latest image
      shell: docker pull nilesh9890/genai-rag:latest

    - name: Run container
      shell: |
        docker run -d \
        --name genai-container \
        -p 5000:8000 \
        -e GROQ_API_KEY="{{ groq_api_key }}" \
        --restart unless-stopped \
        nilesh9890/genai-rag:latest

    - name: Verify container running
      shell: docker ps | grep genai-container