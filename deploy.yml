---
- name: Deploy App
  hosts: ec2
  gather_facts: false
  vars:
    groq_api_key: "{{ groq_api_key | default(lookup('env', 'GROQ_API_KEY'), true) }}"
    app_image: nilesh9890/genai-rag:latest
    app_container_name: genai-container
    app_port: "8000"

  pre_tasks:
    - name: Ensure GROQ_API_KEY is provided
      ansible.builtin.assert:
        that:
          - groq_api_key | length > 0
        fail_msg: "Set GROQ_API_KEY before running this playbook."

  tasks:
    - name: Remove old container if present
      ansible.builtin.shell: docker rm -f {{ app_container_name }} || true
      register: remove_container
      failed_when: false
      changed_when: "'{{ app_container_name }}' in remove_container.stdout"

    - name: Pull latest image in background
      ansible.builtin.shell: docker pull {{ app_image }}
      async: 900
      poll: 0
      register: pull_job

    - name: Wait for image pull to finish
      ansible.builtin.async_status:
        jid: "{{ pull_job.ansible_job_id }}"
      register: pull_status
      until: pull_status.finished
      retries: 90
      delay: 10

    - name: Run container
      ansible.builtin.shell: >
        docker run -d
        -p {{ app_port }}:8000
        --name {{ app_container_name }}
        -e "GROQ_API_KEY={{ groq_api_key }}"
        {{ app_image }}
      register: run_container

    - name: Wait for app port to be reachable
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: "{{ app_port | int }}"
        timeout: 60
        delay: 2

    - name: Show running container
      ansible.builtin.shell: docker ps --filter name={{ app_container_name }}
      register: running_container
      changed_when: false
