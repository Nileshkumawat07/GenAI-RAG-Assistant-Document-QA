---
- name: Deploy App
  hosts: ec2
  gather_facts: no
  vars:
    groq_api_key: "{{ groq_api_key | default(lookup('env', 'GROQ_API_KEY'), true) }}"

  pre_tasks:
    - name: Ensure GROQ_API_KEY is provided
      ansible.builtin.assert:
        that:
          - groq_api_key | length > 0
        fail_msg: "Set GROQ_API_KEY in your shell before running this playbook."

  tasks:
    - name: Pull latest image
      ansible.builtin.command: docker pull nilesh9890/genai-rag:latest

    - name: Run container
      ansible.builtin.command:
        argv:
          - docker
          - run
          - -d
          - -p
          - 8000:8000
          - --name
          - genai-container
          - -e
          - GROQ_API_KEY={{ groq_api_key }}
          - nilesh9890/genai-rag:latest
